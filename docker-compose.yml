services:
  postgres:
    image: postgres:17
    environment:
      - POSTGRES_USER=test-user
      - POSTGRES_PASSWORD=test-pw
      - POSTGRES_DB=cat_db
    ports:
      - 6501:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data/
      - ./docker-entrypoint-initdb.d/:/docker-entrypoint-initdb.d/
volumes:
  postgres_data:
